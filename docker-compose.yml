version: '3.8'

services:
  medagent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medagent-app
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Secret=${JWT_SECRET:-MedAgent-Prod-Secret-Key-Change-This-In-Production-2024!@#$}
      - Jwt__Issuer=MedAgent
      - Jwt__Audience=MedAgentApp
      - Jwt__ExpiryHours=24
    volumes:
      - medagent-data:/app/data
    restart: unless-stopped

volumes:
  medagent-data:
    driver: local
